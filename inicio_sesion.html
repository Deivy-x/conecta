<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión | Quibdó Conecta</title>
<link rel="stylesheet" href="css/inicio_sesion.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="logo">
<img src="Imagenes/Quibdo.png">
</div>

<h1>Iniciar Sesión</h1>

<form id="loginForm">

<div class="input-group">

<label>Correo electrónico</label>

<input type="email" id="email" placeholder="correo@email.com" required>

</div>

<div class="input-group">

<label>Contraseña</label>

<input type="password" id="password" placeholder="********" required>

<span class="toggle" onclick="togglePassword()">Mostrar</span>

</div>

<button class="btn">Ingresar</button>

</form>

<div class="divider">o continuar con</div>

<button class="social">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

Continuar con Google

</button>

<button class="social facebook">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg">

Continuar con Facebook

</button>

<div class="extra">

¿No tienes cuenta?
<a href="register.html">Regístrate</a>

</div>

</div>

<script>

/* MOSTRAR CONTRASEÑA */

function togglePassword(){

let input=document.getElementById("password")

if(input.type==="password"){
input.type="text"
}else{
input.type="password"
}

}

/* VALIDACION */

document.getElementById("loginForm").addEventListener("submit",function(e){

let email=document.getElementById("email").value

if(!email.includes("@")){
alert("Correo inválido")
e.preventDefault()
}

})

/* PARTICULAS */

const canvas=document.getElementById("particles")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2,

dx:(Math.random()-0.5)*0.5,

dy:(Math.random()-0.5)*0.5

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

particles.forEach(p=>{

ctx.beginPath()

ctx.arc(p.x,p.y,p.r,0,Math.PI*2)

ctx.fill()

p.x+=p.dx
p.y+=p.dy

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
