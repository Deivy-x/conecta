<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión | Quibdó Conecta</title>
<link rel="stylesheet" href="css/inicio.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="logo">
<img src="Imagenes/Quibdo.png">
</div>

<h1>Iniciar Sesión</h1>

<form>

<div class="input-group">
<label>Correo</label>
<input type="email" placeholder="correo@email.com" required>
</div>

<div class="input-group">
<label>Contraseña</label>
<input type="password" placeholder="********" required>
</div>

<button class="btn">Ingresar</button>

</form>

<div class="divider">o continuar con</div>

<button class="social-btn">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

Continuar con Google

</button>

<button class="social-btn facebook">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg">

Continuar con Facebook

</button>

<div class="extra">
¿No tienes cuenta? <a href="register.html">Regístrate</a>
</div>

</div>

</body>
</html>
